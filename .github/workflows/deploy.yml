name: Build & Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *" # daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    outputs:
      skipped: ${{ steps.check.outputs.skip }}
    steps:
      - name: Check refresh interval
        id: check
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DAYS=${{ vars.REFRESH_DAYS || '1' }}
          echo "Refresh interval: every $DAYS day(s)"
          if [ "$DAYS" -le 1 ] 2>/dev/null; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          LAST=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/${{ github.workflow }}/runs?status=success&per_page=1" \
            --jq '.workflow_runs[1].created_at // empty' 2>/dev/null || true)
          if [ -z "$LAST" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          LAST_EPOCH=$(date -d "$LAST" +%s)
          NOW_EPOCH=$(date +%s)
          DIFF_DAYS=$(( (NOW_EPOCH - LAST_EPOCH) / 86400 ))
          if [ "$DIFF_DAYS" -lt "$DAYS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⏭ Skipping: only $DIFF_DAYS day(s) since last run (need $DAYS)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "✓ $DIFF_DAYS day(s) since last run, proceeding"
          fi

      - name: Checkout
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: steps.check.outputs.skip != 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: pnpm install

      - name: Run full pipeline
        if: steps.check.outputs.skip != 'true'
        run: pnpm run all
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_BASE_URL: ${{ secrets.AI_API_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_ENABLED: ${{ vars.AI_ENABLED || 'on' }}
          AI_AUTO_CATEGORY: ${{ vars.AI_AUTO_CATEGORY || 'off' }}
          AI_CONCURRENCY: ${{ vars.AI_CONCURRENCY || '3' }}
          SITE_LANGUAGES: ${{ vars.SITE_LANGUAGES || 'en' }}
          SITE_TITLE: ${{ vars.SITE_TITLE || '' }}
          SITE_SUBTITLE: ${{ vars.SITE_SUBTITLE || '' }}
          PROJECT_URL: ${{ vars.PROJECT_URL || '' }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}

      - name: Upload artifact
        if: steps.check.outputs.skip != 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    if: needs.build.outputs.skipped != 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
